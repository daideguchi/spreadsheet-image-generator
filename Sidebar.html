<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 DALL-E 画像生成ツール</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .container {
      max-width: 460px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
      border-radius: 16px 16px 0 0;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin: 0;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .content {
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 0 8px;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }

    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 20px;
      right: -50%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      z-index: 1;
    }

    .step-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 13px;
      position: relative;
      z-index: 2;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .step-text {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      font-weight: 600;
      color: #4a5568;
      line-height: 1.3;
    }

    .instructions {
      background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      border-left: 4px solid #667eea;
    }

    .instructions h3 {
      margin: 0 0 16px 0;
      color: #2d3748;
      font-size: 18px;
      font-weight: bold;
    }

    .instructions p {
      margin: 0 0 12px 0;
      color: #4a5568;
      line-height: 1.6;
      font-size: 17px;
    }

    .instructions p:last-child {
      margin-bottom: 0;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      padding: 22px 36px;
      border: none;
      border-radius: 12px;
      font-size: 19px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    .btn-main {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-setup {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }

    .btn-create {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      color: white;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      display: none;
    }

    .result.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .result.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">🎨 DALL-E 画像生成ツール</h1>
    </div>
    
    <div class="content">
      <div class="card">
        <div class="steps">
          <div class="step">
            <div class="step-circle">1</div>
            <div class="step-text">初期<br>セットアップ</div>
          </div>
          <div class="step">
            <div class="step-circle">2</div>
            <div class="step-text">プロンプト<br>入力</div>
          </div>
          <div class="step">
            <div class="step-circle">3</div>
            <div class="step-text">画像<br>生成</div>
          </div>
        </div>

        <div class="instructions">
          <h3>📋 使い方</h3>
          <p><strong>1️⃣ 初期セットアップ:</strong> 100行の構造化テーブルを作成</p>
          <p><strong>2️⃣ プロンプト入力:</strong> B列にプロンプトを入力</p>
          <p><strong>3️⃣ 画像生成:</strong> ボタンをクリックして画像を生成</p>
        </div>

        <div class="button-group">
          <button class="btn btn-setup" onclick="executeInitialSetup()">
            🔧 初期セットアップ
          </button>
          
          <button class="btn btn-main" onclick="generateFromStructuredTable()">
            🎨 画像生成（構造化テーブル）
          </button>
          
          <button class="btn btn-create" onclick="createStructuredTableOnly()">
            📊 構造化テーブル作成
          </button>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>処理中...</p>
      </div>

      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';
    }

    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }

    function showResult(message, isError = false) {
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = message;
      resultDiv.className = `result ${isError ? 'error' : 'success'}`;
      resultDiv.style.display = 'block';
      hideLoading();
    }

    function executeInitialSetup() {
      showLoading();
      google.script.run
        .withSuccessHandler(function(result) {
          showResult(result);
        })
        .withFailureHandler(function(error) {
          showResult('エラー: ' + error.message, true);
        })
        .showSetupDialog();
    }

    function generateFromStructuredTable() {
      showLoading();
      google.script.run
        .withSuccessHandler(function(result) {
          showResult(result);
        })
        .withFailureHandler(function(error) {
          showResult('エラー: ' + error.message, true);
        })
        .generateImagesFromStructuredTable();
    }

    function createStructuredTableOnly() {
      showLoading();
      google.script.run
        .withSuccessHandler(function(result) {
          showResult(result);
        })
        .withFailureHandler(function(error) {
          showResult('エラー: ' + error.message, true);
        })
        .createStructuredTable();
    }
  </script>
</body>
</html>
